<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1 class="header">PearlsTip</h1>
    </header>

    <div class="full-view">

      <div class="titleinput">
        <label for="" class="label">Bill($)</label>
        <input id="bill" class="userinput" type="number" placeholder="Enter Bill">
      </div>
  
      <div class="titleinput">
        <label for="" class="label">Tip(%)</label>
        <input id="tip" class="userinput" type="number" placeholder="Enter tip %">
      </div>
  
      <hr class="divider">
  
      <div class="titleinput">
        <label for="" class="label">Tip ($)</label>
        <input id="tip-amount" class="useroutput"  readonly>
      </div>
  
      <div class="titleinput">
        <label for="" class="label">Total</label>
        <input id="total" class="useroutput"  readonly>
      </div>

    </div>

    
    <script src="script.js"></script>
  </body>
</html>
