<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word Counter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    
    <textarea name="" id="string-input" cols="30" rows="10" placeholder="Enter Text Here"></textarea>
    <div id="result-display">
        <div class="result-item">
          <p class="item-name">Characters</p>
          <p id="character" class="item-value">0</p>
        </div>

        <div class="result-item">
          <p class="item-name">Words</p>
          <p id="word" class="item-value">0</p>
        </div>

        <div class="result-item">
          <p class="item-name">Sentences</p>
          <p id="sentence" class="item-value">0</p>
        </div>

        <div class="result-item">
          <p class="item-name">Paragraphs</p>
          <p id="paragraph" class="item-value">0</p>
        </div>
    </div>
    
    <script src="script.js"></script>
  </body>
</html>
