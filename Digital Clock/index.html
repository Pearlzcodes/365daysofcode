<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Clock</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="clockface">
      <div class="hour"><div id="hour">00</div>Hours</div>
      <div class="minute"><div id="minute">00</div>Minutes</div>
      <div class="seconds"><div id="seconds">00</div>Seconds</div>
    </div>

    <div class="date-time"><h2 id="date-time">Day, Date Month</h2></div>

    <div class="dark-light">
      <button id="dark-light">
        Switch to Light Mode
      </button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
