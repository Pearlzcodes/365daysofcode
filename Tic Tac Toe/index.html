<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="box-container">
        <div class="boxes" id="box1"></div>
        <div class="boxes" id="box2"></div>
        <div class="boxes" id="box3"></div>
        <div class="boxes" id="box4"></div>
        <div class="boxes" id="box5"></div>
        <div class="boxes" id="box6"></div>
        <div class="boxes" id="box7"></div>
        <div class="boxes" id="box8"></div>
        <div class="boxes" id="box9"></div>
      
        
    </div>

    <div id="displayscreen">It is X's Turn(Tap on any Box to start)</div>
    <div id="scores"></div>
    <button id="reset-btn">Reset</button>

    <select name="game-mode" id="game-mode">
      <option value="1player">One Player(Play With Computer)</option>
      <option value="2players">Two Players</option>
    </select>
    <script src="script.js"></script>
  </body>
</html>
