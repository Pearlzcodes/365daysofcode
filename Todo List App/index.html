<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <button id="addBtn" class="addbtn">+</button>

    <header class="header">PearlsTodo</header>

    <div id="tododisplay">

      
    </div>
    
<div id="cover" class="cover"></div>

    <div id="addinput" class="addinput">
      <label for="">What is to be done?</label>
      <input id="tobedone" type="text"  placeholder="Enter Task Here">
      <label for="">Add Date:</label>
      <input id="datetodo" type="date" placeholder="What day?">
      <label for="">Add Time:</label>
      <input id="timetodo"  type="time" placeholder="What time?">
      <p id="error-catcher">Error Catcher</p>
    </div>
    
    <script src="script.js"></script>
  </body>
</html>
