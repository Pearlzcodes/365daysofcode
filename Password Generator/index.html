<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <form id="passwordForm" action="">
      <div>
        <label for="textonly">Alphabets</label>
        <input id="textonly" name="passwordtype" type="radio" required />
      </div>

      <div>
        <label for="textandnumbers">Alphanumeric</label>
        <input id="textandnumbers" name="passwordtype" type="radio" required />
      </div>

      <div>
        <label for="asciii">ASCIII</label>
      <input id="asciii" name="passwordtype" type="radio" />
      </div>

      <div>
        <label class="lenghtContainer" for="passwordLength">Length</label>
      <input id="passwordLength" type="number" value="8" min="5" required />

      </div>
    </form>

    <button id="getpassword">Get My Password</button>

    <h1 id="password-display">XXXXXXXX</h1>
    <script src="script.js"></script>
  </body>
</html>
